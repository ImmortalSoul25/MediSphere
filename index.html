<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      IMPORTANT: This is Vite's root HTML file.
      It lives at the PROJECT ROOT — NOT inside /src/ or /public/.
      The <div id="root"> is where React mounts your entire app.
      The <script> tag tells Vite where your React entry point is.
    -->
    <title>Maternal Care Portal</title>
  </head>
  <body>
    <!-- React will render inside this div -->
    <div id="root"></div>

    <!--
      type="module" is REQUIRED for Vite.
      This loads main.jsx which starts the entire React app.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
